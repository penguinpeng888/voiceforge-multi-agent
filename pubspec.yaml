name: sleep_cabin_app
description: "睡眠舱智能控制系统 - Flutter移动端应用"
publish_to: 'none'
version: 1.4.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # 蓝牙通信
  flutter_blue_plus: ^1.31.0
  
  # 网络通信
  dio: ^5.4.0
  network_info_plus: ^4.0.0
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # 图表展示
  fl_chart: ^0.66.0
  
  # 状态管理
  provider: ^6.1.1
  get: ^4.6.6
  
  # UI组件
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  
  # 工具类
  intl: ^0.18.1
  uuid: ^4.2.1
  crypto: ^3.0.3
  
  # 权限
  permission_handler: ^11.1.0
  
  # 极光推送（可选）
  jpush_flutter: ^0.8.0
  
  # 语音识别（讯飞SDK）
  # iflytek_sdk: （需要单独集成）

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/
    - assets/icons/