<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>烟雨江南 · 封面预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .cover {
            width: 800px;
            height: 800px;
            background: linear-gradient(180deg, #2d3a4a 0%, #1a2332 100%);
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        /* 江南水墨效果 */
        .ink-blot {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(200,180,150,0.3) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            filter: blur(40px);
        }
        .ink-blot-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(150,130,100,0.2) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            filter: blur(50px);
        }
        /* 雨丝效果 */
        .rain {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(
                75deg,
                transparent,
                transparent 40px,
                rgba(200,200,255,0.03) 40px,
                rgba(200,200,255,0.03) 42px
            );
            animation: rainFall 3s linear infinite;
        }
        @keyframes rainFall {
            0% { transform: translateY(-100px); }
            100% { transform: translateY(0); }
        }
        /* 文字层 */
        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .title {
            font-size: 72px;
            color: #f0e6d3;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            letter-spacing: 12px;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 28px;
            color: rgba(240,230,211,0.7);
            letter-spacing: 8px;
        }
        .logo {
            position: absolute;
            bottom: 50px;
            font-size: 18px;
            color: rgba(240,230,211,0.5);
            letter-spacing: 4px;
        }
        /* 封面元素 */
        .circle-decoration {
            position: absolute;
            border: 2px solid rgba(240,230,211,0.1);
            border-radius: 50%;
        }
        .c1 { width: 300px; height: 300px; top: 50px; left: 50px; }
        .c2 { width: 200px; height: 200px; bottom: 100px; right: 80px; }
        .c3 { width: 150px; height: 150px; top: 200px; right: 200px; }
    </style>
</head>
<body>
    <div class="cover">
        <div class="ink-blot"></div>
        <div class="ink-blot-2"></div>
        <div class="rain"></div>
        <div class="circle-decoration c1"></div>
        <div class="circle-decoration c2"></div>
        <div class="circle-decoration c3"></div>
        <div class="content">
            <div class="title">烟雨江南</div>
            <div class="subtitle">JAZZ × 古风 · 原创单曲</div>
        </div>
        <div class="logo">2026.02.25 · Daily Music</div>
    </div>
</body>
</html>
