<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>酒醒处 灯火阑珊 - 封面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1200px; height: 1200px;
      background: linear-gradient(180deg, #0a0a12 0%, #1a1a2e 50%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif SC', serif;
      overflow: hidden;
    }
    
    /* 月光效果 */
    .moon {
      position: absolute;
      top: 80px;
      right: 100px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle at 30% 30%, #fff9e6 0%, #f5e6c8 40%, #d4a574 100%);
      border-radius: 50%;
      box-shadow: 0 0 80px rgba(255,248,220,0.4), 0 0 150px rgba(255,248,220,0.2);
      opacity: 0.9;
    }
    
    /* 城市剪影 */
    .city {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 400px;
      background: linear-gradient(180deg, transparent 0%, rgba(20,20,35,0.8) 100%);
    }
    
    .building {
      position: absolute;
      bottom: 0;
      background: #0d0d1a;
    }
    
    .b1 { left: 50px; width: 80px; height: 250px; }
    .b2 { left: 150px; width: 120px; height: 320px; }
    .b3 { left: 290px; width: 90px; height: 200px; }
    .b4 { left: 400px; width: 150px; height: 380px; }
    .b5 { left: 570px; width: 100px; height: 280px; }
    .b6 { left: 690px; width: 130px; height: 350px; }
    .b7 { left: 840px; width: 80px; height: 220px; }
    .b8 { left: 940px; width: 160px; height: 300px; }
    .b9 { left: 1120px; width: 90px; height: 260px; }
    
    /* 窗户灯光 */
    .window {
      position: absolute;
      width: 12px;
      height: 18px;
      background: #ffd93d;
      opacity: 0.7;
      animation: twinkle 2s infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
    
    /* 霓虹招牌 */
    .neon {
      position: absolute;
      bottom: 420px;
      font-size: 32px;
      color: #ff6b9d;
      text-shadow: 0 0 10px #ff6b9d, 0 0 20px #ff6b9d, 0 0 40px #ff6b9d;
      animation: neonFlicker 3s infinite;
    }
    .n1 { left: 480px; color: #4ecdc4; text-shadow: 0 0 10px #4ecdc4, 0 0 20px #4ecdc4; }
    .n2 { left: 720px; bottom: 450px; font-size: 24px; color: #ffd93d; text-shadow: 0 0 10px #ffd93d; }
    
    @keyframes neonFlicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.5; }
    }
    
    /* 酒馆 */
    .bar {
      position: absolute;
      bottom: 280px;
      left: 200px;
      width: 200px;
      height: 120px;
      background: linear-gradient(180deg, #2d1f1f 0%, #1a1212 100%);
      border-radius: 5px 5px 0 0;
    }
    .bar::before {
      content: '🌙 老酒馆';
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      color: #d4a574;
      text-shadow: 0 0 8px #d4a574;
    }
    .bar-door {
      position: absolute;
      bottom: 0;
      left: 70px;
      width: 60px;
      height: 80px;
      background: #3d2a2a;
    }
    .bar-window {
      position: absolute;
      top: 20px;
      width: 40px;
      height: 30px;
      background: #ffd93d;
      opacity: 0.6;
    }
    .bw1 { left: 15px; }
    .bw2 { right: 15px; }
    
    /* 标题 */
    .title-container {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-top: 100px;
    }
    
    .main-title {
      font-size: 88px;
      font-weight: 700;
      background: linear-gradient(135deg, #f5e6c8 0%, #d4a574 50%, #f5e6c8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      letter-spacing: 12px;
      animation: titleGlow 4s ease-in-out infinite;
    }
    
    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(212,165,116,0.3)); }
      50% { filter: drop-shadow(0 0 40px rgba(212,165,116,0.6)); }
    }
    
    .subtitle {
      font-size: 28px;
      color: #8b8b9e;
      margin-top: 20px;
      letter-spacing: 8px;
      font-weight: 300;
    }
    
    .artist {
      font-size: 24px;
      color: #6b6b7e;
      margin-top: 30px;
      letter-spacing: 4px;
    }
    
    /* 酒碗装饰 */
    .wine-bowl {
      position: absolute;
      bottom: 550px;
      left: 550px;
      font-size: 60px;
      opacity: 0.8;
      animation: float 4s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    
    /* 音符装饰 */
    .note {
      position: absolute;
      font-size: 40px;
      opacity: 0.4;
      animation: noteFloat 5s linear infinite;
    }
    .n1 { top: 200px; left: 100px; animation-delay: 0s; }
    .n2 { top: 300px; left: 1050px; animation-delay: 2s; font-size: 30px; }
    .n3 { top: 500px; left: 150px; animation-delay: 4s; }
    
    @keyframes noteFloat {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
      100% { transform: translateY(-100px) rotate(20deg); opacity: 0; }
    }
    
    /* 吉他 */
    .guitar {
      position: absolute;
      bottom: 480px;
      left: 280px;
      font-size: 80px;
      opacity: 0.7;
      transform: rotate(-30deg);
    }
    
    /* 边框 */
    .frame {
      position: absolute;
      top: 30px;
      left: 30px;
      right: 30px;
      bottom: 30px;
      border: 2px solid rgba(212,165,116,0.3);
      border-radius: 10px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- 装饰元素 -->
  <div class="guitar">🎸</div>
  <div class="wine-bowl">🍶</div>
  <div class="note n1">🎵</div>
  <div class="note n2">🎶</div>
  <div class="note n3">🎵</div>
  
  <!-- 城市建筑 -->
  <div class="city">
    <div class="building b1"><div class="window" style="top:30px;left:20px"></div><div class="window" style="top:60px;left:45px"></div></div>
    <div class="building b2"><div class="window" style="top:40px;left:30px"></div><div class="window" style="top:80px;left:60px"></div><div class="window" style="top:120px;left:30px"></div></div>
    <div class="building b3"><div class="window" style="top:30px;left:25px"></div><div class="window" style="top:70px;left:50px"></div></div>
    <div class="building b4"><div class="window" style="top:50px;left:20px"></div><div class="window" style="top:90px;left:70px"></div><div class="window" style="top:140px;left:40px"></div><div class="window" style="top:190px;left:80px"></div></div>
    <div class="building b5"><div class="window" style="top:35px;left:25px"></div><div class="window" style="top:75px;left:55px"></div></div>
    <div class="building b6"><div class="window" style="top:45px;left:35px"></div><div class="window" style="top:95px;left:70px"></div><div class="window" style="top:145px;left:45px"></div></div>
    <div class="building b7"><div class="window" style="top:30px;left:20px"></div></div>
    <div class="building b8"><div class="window" style="top:40px;left:30px"></div><div class="window" style="top:85px;left:80px"></div><div class="window" style="top:130px;left:45px"></div></div>
    <div class="building b9"><div class="window" style="top:35px;left:25px"></div><div class="window" style="top:75px;left:50px"></div></div>
  </div>
  
  <!-- 酒馆 -->
  <div class="bar">
    <div class="bar-window bw1"></div>
    <div class="bar-window bw2"></div>
    <div class="bar-door"></div>
  </div>
  
  <!-- 霓虹招牌 -->
  <div class="neon n1">酒醒处</div>
  <div class="neon n2">~营业中~</div>
  
  <!-- 月亮 -->
  <div class="moon"></div>
  
  <!-- 标题 -->
  <div class="title-container">
    <div class="main-title">酒醒处<br>灯火阑珊</div>
    <div class="subtitle">JIU XING CHU · DENG HUO LAN SHAN</div>
    <div class="artist">古风爵士 · 原创民谣</div>
  </div>
  
  <!-- 边框 -->
  <div class="frame"></div>
</body>
</html>
