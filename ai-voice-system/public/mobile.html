<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VoiceForge 移动端</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* Mobile-first styles */
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #1e1e2e;
      --light: #f8fafc;
      --gray: #64748b;
      --card-bg: rgba(255,255,255,0.1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      min-height: 100vh;
      color: #fff;
      padding-bottom: 80px;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(30,30,46,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .header h1 {
      font-size: 18px;
      margin: 0;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Main content */
    .main {
      padding: 72px 16px 100px;
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .icon { font-size: 20px; }

    /* Quick actions */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .action-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-radius: 12px;
      padding: 20px 16px;
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .action-btn:active {
      transform: scale(0.95);
    }

    .action-btn .icon { font-size: 28px; }
    .action-btn .label { font-size: 14px; font-weight: 500; }

    /* Input */
    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 8px;
    }

    textarea, input[type="text"], input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus, input:focus {
      border-color: var(--primary);
    }

    textarea {
      min-height: 120px;
      resize: none;
    }

    /* Buttons */
    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: #fff;
    }

    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Voice list */
    .voice-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .voice-item {
      background: rgba(255,255,255,0.05);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .voice-item:active, .voice-item.selected {
      border-color: var(--primary);
      background: rgba(99,102,241,0.2);
    }

    .voice-item .name { font-weight: 600; font-size: 14px; }
    .voice-item .desc { font-size: 12px; color: var(--gray); margin-top: 4px; }
    
    .voice-item .play-btn {
      margin-top: 8px;
      padding: 6px 12px;
      font-size: 12px;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
    }
    
    .voice-item .play-btn:disabled {
      opacity: 0.6;
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(30,30,46,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--gray);
      text-decoration: none;
      padding: 8px 16px;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--primary);
    }

    .nav-item .icon { font-size: 22px; }
    .nav-item .label { font-size: 11px; }

    /* Page sections */
    .page { display: none; }
    .page.active { display: block; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--gray);
    }

    .loading.active { display: block; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Result */
    .result {
      background: rgba(16,185,129,0.1);
      border: 1px solid var(--success);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      display: none;
    }

    .result.active { display: block; }
    .result audio { width: 100%; margin-top: 12px; }

    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--dark);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Project list */
    .project-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-item .info h3 { margin: 0 0 4px; font-size: 15px; }
    .project-item .info p { margin: 0; font-size: 12px; color: var(--gray); }
    .project-item .arrow { color: var(--gray); }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-success { background: rgba(16,185,129,0.2); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,0.2); color: var(--warning); }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1>🎙️ VoiceForge</h1>
    <span id="server-status" style="font-size:12px;color:var(--success)">●</span>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Home Page -->
    <div id="page-home" class="page active">
      <!-- Quick Actions -->
      <div class="card">
        <div class="card-title"><span class="icon">⚡</span> 快捷操作</div>
        <div class="quick-actions">
          <button class="action-btn" onclick="showPage('synthesize')">
            <span class="icon">🎵</span>
            <span class="label">语音合成</span>
          </button>
          <button class="action-btn" onclick="showPage('clone')">
            <span class="icon">🎤</span>
            <span class="label">音色克隆</span>
          </button>
          <button class="action-btn" onclick="showPage('novel')">
            <span class="icon">📖</span>
            <span class="label">小说导入</span>
          </button>
          <button class="action-btn" onclick="showPage('voices')">
            <span class="icon">🎭</span>
            <span class="label">音色库</span>
          </button>
          <button class="action-btn" onclick="showPage('projects')">
            <span class="icon">📁</span>
            <span class="label">我的项目</span>
          </button>
        </div>
      </div>

      <!-- Recent Projects -->
      <div class="card">
        <div class="card-title"><span class="icon">🕐</span> 最近项目</div>
        <div id="recent-projects">
          <p style="color:var(--gray);text-align:center;padding:20px;">暂无项目</p>
        </div>
      </div>
    </div>

    <!-- Synthesize Page -->
    <div id="page-synthesize" class="page">
      <div class="card">
        <div class="card-title"><span class="icon">🎵</span> 语音合成</div>
        
        <div class="input-group">
          <label>选择音色</label>
          <div class="voice-grid" id="voice-selector">
            <!-- Voices loaded dynamically -->
          </div>
        </div>

        <div class="input-group">
          <label>文本内容</label>
          <textarea id="synth-text" placeholder="请输入要合成的内容..."></textarea>
        </div>

        <div class="input-group">
          <label>语速</label>
          <input type="range" id="synth-speed" min="0.5" max="2" step="0.1" value="1" style="width:100%">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray)">
            <span>慢</span><span id="speed-val">1.0x</span><span>快</span>
          </div>
        </div>

        <button class="btn btn-primary" id="synth-btn" onclick="synthesize()">开始合成</button>
        
        <div class="loading" id="synth-loading">
          <div class="spinner"></div>
          <p>合成中...</p>
        </div>

        <div class="result" id="synth-result">
          <p style="margin:0;color:var(--success)">✅ 合成完成！</p>
          <audio id="synth-audio" controls></audio>
        </div>
      </div>
    </div>

    <!-- Novel Page -->
    <div id="page-novel" class="page">
      <div class="card">
        <div class="card-title"><span class="icon">📖</span> 小说导入</div>
        
        <div class="input-group">
          <label>小说标题</label>
          <input type="text" id="novel-title" placeholder="输入小说标题">
        </div>

        <div class="input-group">
          <label>小说内容</label>
          <textarea id="novel-content" placeholder="粘贴小说文本..." style="min-height:200px"></textarea>
        </div>

        <button class="btn btn-primary" onclick="importNovel()">导入并分析</button>
        
        <div class="loading" id="novel-loading">
          <div class="spinner"></div>
          <p>分析中...</p>
        </div>

        <div class="result" id="novel-result" style="display:none">
          <p style="margin:0;font-weight:600">分析结果</p>
          <div id="novel-stats" style="margin-top:12px;font-size:14px"></div>
        </div>
      </div>
    </div>

    <!-- Voices Page -->
    <div id="page-voices" class="page">
      <div class="card">
        <div class="card-title"><span class="icon">🎭</span> 音色库</div>
        <div class="voice-grid" id="voice-list">
          <!-- Voices loaded dynamically -->
        </div>
      </div>
    </div>

    <!-- Projects Page -->
    <div id="page-projects" class="page">
      <div class="card">
        <div class="card-title"><span class="icon">📁</span> 我的项目</div>
        <div id="project-list">
          <p style="color:var(--gray);text-align:center;padding:20px;">暂无项目</p>
        </div>
      </div>
    </div>

    <!-- Clone Page -->
    <div id="page-clone" class="page">
      <div class="card">
        <div class="card-title"><span class="icon">🎤</span> 音色克隆</div>
        <p style="color:var(--gray);font-size:14px;margin-bottom:16px">
          上传参考音频（5分钟以上），提取声纹特征，生成专属音色
        </p>
        
        <div class="input-group">
          <label>选择参考音频</label>
          <input type="file" id="clone-audio" accept="audio/*" style="display:none" onchange="showAudioName(this)">
          <button class="btn" style="background:rgba(255,255,255,0.1)" onclick="document.getElementById('clone-audio').click()">
            📁 选择音频文件
          </button>
          <p id="audio-name" style="font-size:12px;color:var(--gray);margin-top:8px"></p>
        </div>

        <div class="input-group">
          <label>音色名称</label>
          <input type="text" id="clone-name" placeholder="给音色起个名字">
        </div>

        <button class="btn btn-primary" onclick="cloneVoice()">开始克隆</button>
        
        <div class="loading" id="clone-loading">
          <div class="spinner"></div>
          <p>克隆中，请稍候...</p>
        </div>

        <div class="result" id="clone-result" style="display:none">
          <p style="margin:0;color:var(--success)">✅ 克隆成功！</p>
          <div id="clone-info" style="margin-top:12px;font-size:14px"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="icon">📋</span> 我的克隆音色</div>
        <div id="cloned-voices">
          <p style="color:var(--gray);text-align:center;padding:20px">暂无克隆音色</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="#" onclick="showPage('home');return false">
      <span class="icon">🏠</span>
      <span class="label">首页</span>
    </a>
    <a class="nav-item" href="#" onclick="showPage('synthesize');return false">
      <span class="icon">🎵</span>
      <span class="label">合成</span>
    </a>
    <a class="nav-item" href="#" onclick="showPage('novel');return false">
      <span class="icon">📖</span>
      <span class="label">小说</span>
    </a>
    <a class="nav-item" href="#" onclick="showPage('projects');return false">
      <span class="icon">📁</span>
      <span class="label">项目</span>
    </a>
    <a class="nav-item" href="#" onclick="showPage('clone');return false">
      <span class="icon">🎤</span>
      <span class="label">克隆</span>
    </a>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    // API Base URL
    const API_BASE = 'http://43.153.175.239';
    const APIS = {
      tts: API_BASE + ':3200',
      novel: API_BASE + ':3300'
    };

    // Preset voices (fallback)
    const voices = [
      {id:'male_xuhan',name:'徐寒',description:'冷峻剑客'},
      {id:'male_baijing',name:'白衣卿相',description:'温润公子'},
      {id:'male_cangyao',name:'苍遥',description:'豪放侠客'},
      {id:'male_shanyin',name:'山隐',description:'沉稳老者'},
      {id:'male_xuanqing',name:'玄青',description:'清冷仙长'},
      {id:'female_biyun',name:'碧云',description:'灵动少女'},
      {id:'female_xueman',name:'雪曼',description:'冰山美人'},
      {id:'female_changming',name:'长鸣',description:'温柔邻家'},
      {id:'female_guiyuan',name:'归原',description:'沧桑女子'},
      {id:'female_xiannv',name:'仙女',description:'空灵仙音'},
      {id:'elder_man',name:'老者',description:'沧桑虚弱'},
      {id:'child_girl',name:'女童',description:'稚嫩可爱'},
      {id:'child_boy',name:'男童',description:'活泼俏皮'},
      {id:'demon_lord',name:'魔主',description:'霸道邪魅'},
      {id:'god_voice',name:'天神',description:'庄严慈悲'}
    ];

    let selectedVoice = 'male_xuhan';

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initVoices(); // Use hardcoded voices directly
      checkServer();
    });

    // Show page
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + pageId).classList.add('active');
      
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event?.target?.closest('.nav-item')?.classList.add('active');

      if (pageId === 'projects') loadProjects();
    }

    // Init voices
    function initVoices() {
      const grid = document.getElementById('voice-selector');
      const list = document.getElementById('voice-list');
      
      const voiceList = voices;
      
      voiceList.forEach(v => {
        const name = v.name || v.title || '未知';
        const desc = v.description || v.desc || '';
        const item = `<div class="voice-item ${v.id === selectedVoice ? 'selected' : ''}" 
          onclick="selectVoice('${v.id}')" data-id="${v.id}">
          <div class="name">${name}</div>
          <div class="desc">${desc}</div>
          <button class="play-btn" onclick="playSample('${v.id}',event)">▶ 试听</button>
        </div>`;
        grid.innerHTML += item;
        list.innerHTML += item;
      });

      // Speed slider
      document.getElementById('synth-speed').addEventListener('input', (e) => {
        document.getElementById('speed-val').textContent = e.target.value + 'x';
      });
    }

    // Select voice
    function selectVoice(id) {
      selectedVoice = id;
      document.querySelectorAll('.voice-item').forEach(el => {
        el.classList.toggle('selected', el.dataset.id === id);
      });
    }

    // Check server
    async function checkServer() {
      try {
        await fetch(APIS.tts + '/', {method:'GET'});
        document.getElementById('server-status').style.color = 'var(--success)';
      } catch {
        document.getElementById('server-status').style.color = 'var(--danger)';
      }
    }

    // Synthesize
    async function synthesize() {
      const text = document.getElementById('synth-text').value.trim();
      if (!text) { showToast('请输入文本'); return; }

      const btn = document.getElementById('synth-btn');
      const loading = document.getElementById('synth-loading');
      const result = document.getElementById('synth-result');

      btn.disabled = true;
      loading.classList.add('active');
      result.classList.remove('active');

      try {
        const speed = parseFloat(document.getElementById('synth-speed').value);
        const res = await fetch(APIS.tts + '/api/synthesize', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            text,
            voice_id: selectedVoice,
            options: { speed }
          })
        });

        const data = await res.json();
        
        if (data.audio) {
          document.getElementById('synth-audio').src = 'data:audio/mp3;base64,' + data.audio;
          result.classList.add('active');
        } else {
          showToast(data.error || '合成失败');
        }
      } catch (e) {
        showToast('请求失败: ' + e.message);
      } finally {
        btn.disabled = false;
        loading.classList.remove('active');
      }
    }

    // Import novel
    async function importNovel() {
      const title = document.getElementById('novel-title').value.trim();
      const content = document.getElementById('novel-content').value.trim();
      
      if (!title || !content) { showToast('请填写标题和内容'); return; }

      const loading = document.getElementById('novel-loading');
      const result = document.getElementById('novel-result');

      loading.classList.add('active');

      try {
        // First import
        await fetch(APIS.novel + '/api/novel/import', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({title, content})
        });

        // Then analyze
        const res = await fetch(APIS.novel + '/api/novel/analyze', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({content})
        });

        const data = await res.json();
        
        document.getElementById('novel-stats').innerHTML = `
          <p>角色数量: ${data.roles?.length || 0}</p>
          <p>段落数量: ${data.segments}</p>
          <p>情感分布: ${JSON.stringify(data.emotionStats || {})}</p>
        `;
        result.style.display = 'block';
        showToast('导入成功！');
      } catch (e) {
        showToast('导入失败: ' + e.message);
      } finally {
        loading.classList.remove('active');
      }
    }

    // Load projects
    async function loadProjects() {
      try {
        const res = await fetch(APIS.novel + '/api/projects');
        const data = await res.json();
        
        const list = document.getElementById('project-list');
        if (data.projects?.length > 0) {
          list.innerHTML = data.projects.slice(0,5).map(p => `
            <div class="project-item">
              <div class="info">
                <h3>${p.title}</h3>
                <p>${p.wordCount}字 · ${new Date(p.importedAt).toLocaleDateString()}</p>
              </div>
              <span class="arrow">→</span>
            </div>
          `).join('');
        }
      } catch (e) {
        console.log('Load projects failed:', e);
      }
    }

    // Play sample audio
    async function playSample(voiceId, event) {
      event.stopPropagation();
      
      const btn = event.target;
      btn.textContent = '...';
      btn.disabled = true;
      
      try {
        const res = await fetch(APIS.tts + '/api/voices/' + voiceId + '/sample', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'}
        });
        
        const data = await res.json();
        
        if (data.audio) {
          const audio = new Audio('data:audio/mp3;base64,' + data.audio);
          audio.play();
          showToast('▶ 正在播放: ' + data.voiceName);
          
          audio.onended = () => {
            btn.textContent = '▶ 试听';
            btn.disabled = false;
          };
        } else {
          showToast(data.error || '生成失败');
          btn.textContent = '▶ 试听';
          btn.disabled = false;
        }
      } catch (e) {
        showToast('请求失败: ' + e.message);
        btn.textContent = '▶ 试听';
        btn.disabled = false;
      }
    }

    // Show selected audio name
    function showAudioName(input) {
      if (input.files && input.files[0]) {
        document.getElementById('audio-name').textContent = '已选择: ' + input.files[0].name;
      }
    }

    // Clone voice
    async function cloneVoice() {
      const fileInput = document.getElementById('clone-audio');
      const name = document.getElementById('clone-name').value.trim();
      const desc = document.getElementById('clone-desc').value.trim();
      
      if (!fileInput.files || !fileInput.files[0]) {
        showToast('请选择参考音频文件');
        return;
      }
      
      if (!name) {
        showToast('请输入音色名称');
        return;
      }

      const formData = new FormData();
      formData.append('audio', fileInput.files[0]);
      formData.append('name', name);
      formData.append('description', desc);

      const loading = document.getElementById('clone-loading');
      const result = document.getElementById('clone-result');
      
      loading.classList.add('active');
      result.style.display = 'none';

      try {
        const res = await fetch(API_BASE + ':3000/api/clone-voice', {
          method: 'POST',
          body: formData
        });
        
        const data = await res.json();
        
        if (data.success) {
          document.getElementById('clone-info').innerHTML = `
            <p>音色名称: ${data.voice?.name}</p>
            <p>音频文件: ${data.voice?.audioFile}</p>
          `;
          result.style.display = 'block';
          showToast('✅ 克隆成功！');
        } else {
          showToast(data.message || '克隆失败');
        }
      } catch (e) {
        showToast('请求失败: ' + e.message);
      } finally {
        loading.classList.remove('active');
      }
    }

    // Toast
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
